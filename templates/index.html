<!DOCTYPE html>
<html lang="ru">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta charset="UTF-8">
    <title>Мессенджер</title>
    <script src="https://cdn.socket.io/4.5.4/socket.io.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial; background: #1a1a2e; color: white; }
        .container { display: flex; height: 100vh; }
        .users { width: 260px; background: #16213e; padding: 20px; overflow-y: auto; border-right: 1px solid #0f3460; display: flex; flex-direction: column; }
        .users h3 { margin-bottom: 15px; color: #e94560; }
        .search-box { margin-bottom: 15px; }
        .search-box input { width: 100%; padding: 8px; border-radius: 20px; border: none; outline: none; background: #0f3460; color: white; padding-left: 15px; }
        .user { padding: 12px; margin: 5px 0; background: #0f3460; border-radius: 8px; cursor: pointer; transition: all 0.2s ease; }
        .user:hover { background: #e94560; transform: translateX(5px); }
        .user.active { background: #e94560; }
        .user.hidden { display: none; }
        .chat { flex: 1; display: flex; flex-direction: column; }
        .chat-header { background: #16213e; padding: 15px 20px; border-bottom: 1px solid #0f3460; }
        .chat-header h2 { color: #e94560; }
        .messages { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; background: #1a1a2e; }
        .message { max-width: 65%; padding: 12px 15px; border-radius: 18px; opacity: 0; transform: translateY(10px); animation: fadeInUp 0.2s ease forwards; }
        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .message-own { align-self: flex-end; background: #e94560; border-bottom-right-radius: 4px; }
        .message-other { align-self: flex-start; background: #0f3460; border-bottom-left-radius: 4px; }
        .message strong { font-size: 13px; opacity: 0.9; }
        .message-text { margin-top: 5px; word-wrap: break-word; }
        .message-time { font-size: 10px; opacity: 0.6; margin-top: 5px; text-align: right; }
        .input-area { display: flex; padding: 15px; background: #16213e; gap: 10px; border-top: 1px solid #0f3460; }
        .input-area input { flex: 1; padding: 12px; border: none; border-radius: 25px; outline: none; font-size: 14px; }
        .input-area button { padding: 12px 25px; background: #e94560; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .input-area button:hover { background: #ff6b81; transform: scale(1.02); }
        .logout { position: fixed; bottom: 20px; left: 20px; background: #e94560; padding: 10px 20px; border-radius: 25px; text-decoration: none; color: white; font-weight: bold; transition: 0.2s; z-index: 100; }
        .logout:hover { background: #ff6b81; transform: translateY(-2px); }
        .no-user { text-align: center; color: #888; margin-top: 50px; }
        .typing { font-size: 12px; color: #888; padding: 5px 15px; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        <div class="users">
            <h3>📱 Пользователи</h3>
            <div class="search-box">
                <input type="text" id="searchUser" placeholder="🔍 Поиск пользователя...">
            </div>
            <div id="users-list">
                {% for user in users %}
                    <div class="user" data-user="{{ user }}">{{ user }}</div>
                {% endfor %}
            </div>
        </div>
        <div class="chat">
            <div class="chat-header">
                <h2 id="current-user">✨ Выберите собеседника</h2>
            </div>
            <div class="messages" id="messages">
                <div class="no-user">👈 Нажмите на пользователя слева</div>
            </div>
            <div class="input-area">
                <input type="text" id="message-input" placeholder="Введите сообщение...">
                <button id="send-btn">📤 Отправить</button>
            </div>
        </div>
    </div>
    <a href="/logout" class="logout">🚪 Выйти</a>

    <script>
        const socket = io();
        let currentUser = null;
        let username = "{{ username }}";

        socket.emit('join');

        const months = {
            '01': 'января', '02': 'февраля', '03': 'марта', '04': 'апреля',
            '05': 'мая', '06': 'июня', '07': 'июля', '08': 'августа',
            '09': 'сентября', '10': 'октября', '11': 'ноября', '12': 'декабря'
        };

        function formatDateTime(isoString) {
            const date = new Date(isoString);
            const day = date.getDate();
            const month = months[(date.getMonth() + 1).toString().padStart(2, '0')];
            const year = date.getFullYear();
            const hours = date.getHours().toString().padStart(2, '0');
            const minutes = date.getMinutes().toString().padStart(2, '0');
            return `${day} ${month} ${year} в ${hours}:${minutes}`;
        }

        // Поиск пользователей
        const searchInput = document.getElementById('searchUser');
        const allUsers = document.querySelectorAll('.user');

        searchInput.addEventListener('input', () => {
            const query = searchInput.value.toLowerCase();
            allUsers.forEach(user => {
                const name = user.dataset.user.toLowerCase();
                if (name.includes(query)) {
                    user.classList.remove('hidden');
                } else {
                    user.classList.add('hidden');
                }
            });
        });

        // Выбор собеседника
        allUsers.forEach(user => {
            user.addEventListener('click', () => {
                allUsers.forEach(u => u.classList.remove('active'));
                user.classList.add('active');
                currentUser = user.dataset.user;
                document.getElementById('current-user').innerHTML = `💬 Чат с ${currentUser}`;
                loadMessages(currentUser);
            });
        });

        async function loadMessages(toUser) {
            const res = await fetch(`/api/messages/${toUser}`);
            const messages = await res.json();
            const container = document.getElementById('messages');
            container.innerHTML = '';
            if (messages.length === 0) {
                container.innerHTML = '<div class="no-user">💬 Напишите первое сообщение!</div>';
            }
            messages.forEach(msg => {
                addMessageToChat(msg.from, msg.message, msg.time);
            });
        }

        function addMessageToChat(from, message, time, isNew = false) {
            const container = document.getElementById('messages');
            if (container.children.length === 1 && container.children[0].classList?.contains('no-user')) {
                container.innerHTML = '';
            }
            const div = document.createElement('div');
            div.className = `message ${from === username ? 'message-own' : 'message-other'}`;
            div.innerHTML = `
                <strong>${from === username ? 'Вы' : from}</strong>
                <div class="message-text">${escapeHtml(message)}</div>
                <div class="message-time">📅 ${formatDateTime(time)}</div>
            `;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.getElementById('send-btn').addEventListener('click', () => {
            const input = document.getElementById('message-input');
            const message = input.value.trim();
            if (message && currentUser) {
                socket.emit('send_message', { to: currentUser, message: message });
                input.value = '';
            }
        });

        socket.on('receive_message', (data) => {
            if (data.from === currentUser || data.from === username) {
                addMessageToChat(data.from, data.message, data.time, true);
            }
        });

        document.getElementById('message-input').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                document.getElementById('send-btn').click();
            }
        });
    </script>
</body>
</html>
